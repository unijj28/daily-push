<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日推送 · Daily Push</title>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a2e;
    --card-hover: #1f1f35;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eaeaea;
    --text-dim: #8892a4;
    --border: #2a2a4a;
    --green: #00d47e;
    --red: #ff4757;
    --yellow: #ffa502;
    --blue: #3498db;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 30px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }
  .header h1 {
    font-size: 2em;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 0.9em;
  }

  /* Date nav */
  .date-nav {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 10px 0 20px;
    scrollbar-width: none;
  }
  .date-nav::-webkit-scrollbar { display: none; }
  .date-btn {
    flex-shrink: 0;
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.85em;
    transition: all 0.2s;
  }
  .date-btn:hover { border-color: var(--accent); color: var(--text); }
  .date-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Section cards */
  .section {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .section:hover { border-color: var(--accent); }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 1.15em;
    font-weight: 600;
  }
  .section-icon { font-size: 1.3em; }

  .news-list { list-style: none; }
  .news-list li {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    position: relative;
    padding-left: 16px;
  }
  .news-list li:last-child { border-bottom: none; }
  .news-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 18px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* AI news special */
  .ai-item {
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .ai-item:last-child { border-bottom: none; }
  .ai-title { font-weight: 600; margin-bottom: 4px; }
  .ai-comment {
    color: var(--text-dim);
    font-size: 0.88em;
    padding-left: 12px;
    border-left: 2px solid var(--accent);
  }

  /* Weather */
  .weather-card {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .weather-main {
    grid-column: 1 / -1;
    font-size: 1.1em;
  }
  .weather-stat {
    background: rgba(255,255,255,0.03);
    padding: 12px;
    border-radius: 10px;
    text-align: center;
  }
  .weather-stat .label {
    color: var(--text-dim);
    font-size: 0.8em;
    margin-bottom: 4px;
  }
  .weather-stat .value {
    font-size: 1.3em;
    font-weight: 600;
  }
  .weather-tip {
    grid-column: 1 / -1;
    background: rgba(233, 69, 96, 0.1);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.9em;
    color: var(--yellow);
  }

  /* Markets */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  .market-item {
    background: rgba(255,255,255,0.03);
    padding: 14px;
    border-radius: 10px;
    text-align: center;
  }
  .market-name {
    color: var(--text-dim);
    font-size: 0.8em;
    margin-bottom: 6px;
  }
  .market-value {
    font-size: 1.1em;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .market-change {
    font-size: 0.85em;
    font-weight: 600;
  }
  .market-change.up { color: var(--green); }
  .market-change.down { color: var(--red); }

  /* Dedao */
  .dedao-item {
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .dedao-item:last-child { border-bottom: none; }
  .dedao-course {
    font-size: 0.8em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .dedao-title {
    font-weight: 600;
    margin-bottom: 4px;
  }
  .dedao-ep {
    color: var(--text-dim);
    font-size: 0.85em;
  }
  .dedao-status {
    display: inline-block;
    margin-top: 6px;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.78em;
    background: rgba(0, 212, 126, 0.15);
    color: var(--green);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 30px 0;
    color: var(--text-dim);
    font-size: 0.8em;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 0;
    color: var(--text-dim);
  }
  .loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 480px) {
    .header h1 { font-size: 1.5em; }
    .section { padding: 18px; }
    .market-grid { grid-template-columns: repeat(2, 1fr); }
    .weather-card { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📡 每日推送</h1>
    <div class="subtitle">新闻 · 天气 · 市场 · 得到文章分析</div>
  </div>

  <div class="date-nav" id="dateNav"></div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>加载中...</div>
    </div>
  </div>

  <div class="footer">
    Powered by OpenClaw · Auto-generated daily
  </div>
</div>

<script>
let allData = [];
let currentIdx = 0;

async function init() {
  try {
    const resp = await fetch('data.json');
    allData = await resp.json();
    allData.sort((a, b) => b.date.localeCompare(a.date)); // newest first
    renderDateNav();
    renderDay(0);
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="loading">加载失败</div>';
  }
}

function renderDateNav() {
  const nav = document.getElementById('dateNav');
  nav.innerHTML = allData.map((d, i) =>
    `<button class="date-btn ${i === 0 ? 'active' : ''}" onclick="selectDay(${i})">${d.date} ${d.weekday}</button>`
  ).join('');
}

function selectDay(idx) {
  currentIdx = idx;
  document.querySelectorAll('.date-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  renderDay(idx);
}

function renderDay(idx) {
  const day = allData[idx];
  if (!day) return;
  const b = day.briefing;
  const content = document.getElementById('content');
  let html = '';

  // Australia
  if (b?.australia?.length) {
    html += section('🇦🇺', '澳洲要闻', newsList(b.australia));
  }

  // World
  if (b?.world?.length) {
    html += section('🌏', '国际头条', newsList(b.world));
  }

  // China
  if (b?.china?.length) {
    html += section('🇨🇳', '中国新闻', newsList(b.china));
  }

  // AI
  if (b?.ai?.length) {
    html += section('🤖', 'AI / LLM 技术动态', aiList(b.ai));
  }

  // Weather
  if (b?.weather) {
    html += section('🌤', '墨尔本天气', weatherCard(b.weather));
  }

  // Markets
  if (b?.markets) {
    html += section('📈', '市场动态', marketGrid(b.markets));
  }

  // Dedao
  if (day.dedao?.length) {
    html += section('📚', '得到日报', dedaoList(day.dedao));
  }

  content.innerHTML = html;
}

function section(icon, title, body) {
  return `<div class="section">
    <div class="section-header"><span class="section-icon">${icon}</span> ${title}</div>
    ${body}
  </div>`;
}

function newsList(items) {
  return `<ul class="news-list">${items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`;
}

function aiList(items) {
  return items.map(i => {
    if (typeof i === 'string') return `<div class="ai-item"><div>${esc(i)}</div></div>`;
    return `<div class="ai-item">
      <div class="ai-title">${esc(i.title)}</div>
      <div class="ai-comment">${esc(i.comment)}</div>
    </div>`;
  }).join('');
}

function weatherCard(w) {
  return `<div class="weather-card">
    <div class="weather-main">☁️ ${esc(w.condition)}</div>
    <div class="weather-stat"><div class="label">最低</div><div class="value">${w.tempLow}°C</div></div>
    <div class="weather-stat"><div class="label">最高</div><div class="value">${w.tempHigh}°C</div></div>
    <div class="weather-stat"><div class="label">湿度</div><div class="value">${w.humidity}%</div></div>
    <div class="weather-stat"><div class="label">风</div><div class="value" style="font-size:0.9em">${esc(w.wind)}</div></div>
    ${w.tip ? `<div class="weather-tip">☂️ ${esc(w.tip)}</div>` : ''}
  </div>`;
}

function marketGrid(m) {
  const names = {
    asx200: 'ASX 200', sp500: 'S&P 500', dow: '道琼斯',
    hsi: '恒生指数', sse: '上证指数', gold: '黄金',
    aud: '澳元', iron: '铁矿石', oil: '原油'
  };
  return `<div class="market-grid">${Object.entries(m).map(([k, v]) => {
    const ch = v.change || '';
    const cls = ch.startsWith('+') ? 'up' : ch.startsWith('-') ? 'down' : '';
    return `<div class="market-item">
      <div class="market-name">${names[k] || k}</div>
      <div class="market-value">${esc(v.value)}</div>
      <div class="market-change ${cls}">${esc(ch)}</div>
    </div>`;
  }).join('')}</div>`;
}

function dedaoList(items) {
  return items.map(d => `<div class="dedao-item">
    <div class="dedao-course">📌 ${esc(d.course)}</div>
    <div class="dedao-title">${esc(d.title)}</div>
    <div class="dedao-ep">第${d.episode}讲</div>
    <div class="dedao-status">✅ ${esc(d.status)}</div>
  </div>`).join('');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
